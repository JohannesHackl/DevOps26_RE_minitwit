stages:
  - test
  - build
  - deploy
  - release

variables:
  # Same Go version as stated in Dockerfile
  GO_VERSION: "1.25.0"
  DOCKER_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"

# test stage：run minitwit_simulator.py
test:
  stage: test
  image: python:3.9
  services:
    - postgres:14
  variables:
    POSTGRES_DB: minitwit
    POSTGRES_USER: minitwit
    POSTGRES_PASSWORD: minitwit
  script:
    - pip install -r requirements.txt
    - python3 test/minitwit_simulator.py

# build stage: use Dockerfile to build the environment
build:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build --build-arg GO_VERSION=$GO_VERSION -t "$DOCKER_IMAGE" .
    - docker push "$DOCKER_IMAGE"

# deploy stage：replace original Vagrantfile manually deploy
deploy:
  stage: deploy
  image: alpine:latest
  only:
    - main
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$DO_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
  script:
    # SSH login into Digital Ocean, run Docker logic, replace the original nohup action
    - |
      ssh -o StrictHostKeyChecking=no $DO_USER@$DO_HOST "
        docker login -u '$CI_REGISTRY_USER' -p '$CI_REGISTRY_PASSWORD' '$CI_REGISTRY' &&
        docker pull $DOCKER_IMAGE &&
        docker stop minitwit || true &&
        docker rm minitwit || true &&
        docker run -d --name minitwit \
          -p 5001:5001 \
          -e DB_ADDR='$DB_ADDR' \
          $DOCKER_IMAGE"

# release stage: release on GitHub
github_release:
  stage: release
  image: curlimages/curl:latest
  only:
    - tags
  script:
    - |
      curl --request POST \
        --url "https://api.github.com/repos/$GITHUB_USER/$GITHUB_REPO/releases" \
        --header "Authorization: token $GITHUB_TOKEN" \
        --header "Content-Type: application/json" \
        --data "{
          \"tag_name\": \"$CI_COMMIT_TAG\",
          \"name\": \"Release $CI_COMMIT_TAG\",
          \"body\": \"Automatic release from GitLab CI of the version deployed to production.\"
        }"