name: Test Branch CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: docker compose -f docker-compose-tests.yaml up --abort-on-container-exit --exit-code-from test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile-app
          push: true
          build-args: GO_VERSION=1.25.0
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/minitwit:test-${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/minitwit:test-latest

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Tests passed and test image built!\n\nTest image: `${{ secrets.DOCKERHUB_USERNAME }}/minitwit:test-${{ github.ref_name }}`\n\nYou can deploy this for manual testing if needed.'
            })
