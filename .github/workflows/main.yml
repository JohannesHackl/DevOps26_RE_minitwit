name: MiniTwit CI/CD

on:
  push:
    branches: [ main ]
    # Trigger when tags starting with 'v' are pushed (e.g., v1.0, v1.2.3)
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: docker compose -f docker-compose-tests.yaml up --abort-on-container-exit --exit-code-from test
  # Stage 1: Build the Docker image and push to Docker Hub
  build-and-push:
    # Only run on main branch pushes, not on tags
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile-app
          push: true
          build-args: GO_VERSION=1.25.0
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/minitwit:latest

  # Stage 2: Deploy to Digital Ocean droplet via SSH
  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /vagrant
            DB_IP=$(cat db_ip.txt)
            export DB_ADDR=$DB_IP
            export DOCKER_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/minitwit:latest
            docker compose -f docker-compose-app.yaml pull
            docker compose -f docker-compose-app.yaml up -d

  # Stage 3: Create GitHub Release
  release:
    # Only run when a tag is pushed
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important: Grant permission to create a release
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Automatically generate release notes based on commit logs
          generate_release_notes: true
          # You can specify a custom body or leave it to auto-generate
          body: "Automated release for version ${{ github.ref_name }}"
