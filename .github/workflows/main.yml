name: CI/CD Pipeline

on:
  push:
    # Only trigger on push to main branch
    branches:
      - main
  pull_request:
    # Only trigger on PRs targeting main branch
    branches:
      - main

permissions:
  pull-requests: write
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: docker compose -f docker-compose-tests.yaml up --abort-on-container-exit --exit-code-from test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.prepare.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare environment variables and Docker tags
        id: prepare
        run: |
          # Sanitize branch name replacing slashes with dashes
          BRANCH_NAME=$(echo '${{ github.head_ref || github.ref_name }}' | tr '/' '-')
          
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "docker_tags=${{ secrets.DOCKERHUB_USERNAME }}/minitwit:latest" >> $GITHUB_OUTPUT
            echo "image_tag=${{ secrets.DOCKERHUB_USERNAME }}/minitwit:latest" >> $GITHUB_OUTPUT
          else
            echo "docker_tags=${{ secrets.DOCKERHUB_USERNAME }}/minitwit:test-${BRANCH_NAME},${{ secrets.DOCKERHUB_USERNAME }}/minitwit:test-latest" >> $GITHUB_OUTPUT
            echo "image_tag=${{ secrets.DOCKERHUB_USERNAME }}/minitwit:test-${BRANCH_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile-app
          push: true
          build-args: GO_VERSION=1.25.0
          tags: ${{ steps.prepare.outputs.docker_tags }}

      - name: Comment on PR
        # Only execute this step during a Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Tests passed and test image built!\n\nTest image: `${{ steps.prepare.outputs.image_tag }}`\n\nYou can deploy this for manual testing if needed.'
            })

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ github.ref == 'refs/heads/main' && secrets.DO_HOST || secrets.DO_HOST_STAGE }}
          username: ${{ secrets.DO_USER }}
          key: ${{ github.ref == 'refs/heads/main' && secrets.DO_SSH_KEY || secrets.DO_SSH_KEY_STAGE }}
          source: "docker-compose-app.yaml"
          target: "/opt/minitwit"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_ADDR: ${{ github.ref == 'refs/heads/main' && secrets.DO_DB || secrets.DO_DB_STAGE }}
          DOCKER_IMAGE: ${{ needs.build-and-push.outputs.image_tag }}
        with:
          host: ${{ github.ref == 'refs/heads/main' && secrets.DO_HOST || secrets.DO_HOST_STAGE }}
          username: ${{ secrets.DO_USER }}
          key: ${{ github.ref == 'refs/heads/main' && secrets.DO_SSH_KEY || secrets.DO_SSH_KEY_STAGE }}
          envs: DB_ADDR,DOCKER_IMAGE
          script: |
            # Navigate to the new deployment directory instead of /vagrant
            cd /opt/minitwit
            
            export DB_ADDR=$DB_ADDR
            export DOCKER_IMAGE=$DOCKER_IMAGE
            
            docker compose -f docker-compose-app.yaml pull
            docker compose -f docker-compose-app.yaml up -d